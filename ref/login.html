<img alt="BSI Logo" class="h-12 w-auto object-contain" data-alt="A clean, professional bank logo for BSI Bank Syariah Indonesia, rendered in a crisp vector format. The logo features a modern, corporate aesthetic with Brand Teal accents, set against a pristine white background. The image is bright and high-key, conveying a sense of institutional trust, security, and digital-first banking reliability." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWKrc6VabEMu71Zg7aR0kRrMxxX5ehHzPIA7B8B-lgNpwg9rM8qoOafInWyQXZfYc2JZqI09gd7LfaRDioCIo1OqnSD8NYgm_vnF9pqcUm0ZUDjNTlpOCbMdQXEDWbB_3LuN3ocj0TVwebFfBfeOfsHmPwS6VNWGEE7EQhJBRT2KMoX8dkQ9aUDoEKp0Snk09kCvawVZunWmmROs-qu429-8ycJTaq703FyS11vBR4rOjVl0pR70U9bdNgRLWoA5UZ5HvMNSnRhck"/>

<h1 class="font-headline-md text-headline-md text-primary text-center">BSI Hajj Online</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1 text-center">Institutional Portal for Digital Pilgrimage Management</p>
</div>
<!-- Login Card -->

<form class="space-y-stack-md" id="loginForm">
<!-- Email/HP Input -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="identifier">Email or Phone Number</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg font-body-md focus:ring-2 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="identifier" name="identifier" placeholder="example@domain.com" required="" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-white border border-outline-variant rounded-lg font-body-md focus:ring-2 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors p-1" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="eyeIcon">visibility</span>
</button>
</div>
</div>

<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer select-none" for="remember">Keep me logged in on this device</label>
</div>

<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility';
            }
        }

        // Simple form handling
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Loading state
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Authenticating...';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Welcome';
                btn.classList.replace('bg-primary-container', 'bg-green-600');
                
                // Simulate redirect
                setTimeout(() => {
                    // Logic for redirection would go here
                    alert('Login successful! Redirecting to Dashboard...');
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                    btn.classList.replace('bg-green-600', 'bg-primary-container');
                }, 1000);
            }, 1500);
        });

        // Background floating elements for atmosphere
        function createOrb() {
            const orb = document.createElement('div');
            orb.className = 'absolute rounded-full bg-primary-container/10 blur-xl pointer-events-none transition-all duration-7000';
            const size = Math.random() * 100 + 50 + 'px';
            orb.style.width = size;
            orb.style.height = size;
            orb.style.left = Math.random() * 100 + '%';
            orb.style.top = Math.random() * 100 + '%';
            document.body.appendChild(orb);
            
            setTimeout(() => {
                orb.style.opacity = '0';
                setTimeout(() => orb.remove(), 1000);
            }, 6000);
        }

        setInterval(createOrb, 4000);
    </script>
